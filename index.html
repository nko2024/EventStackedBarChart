<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Economic Impact Events Chart</title>

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

  <div class="viz-shell">

    <div class="viz-card">

      <div class="chart-header">

        <div>
          <div class="chart-eyebrow">
            Economic Development & Tourism
          </div>

          <h2 class="chart-title">
            Major Event Economic Impact
          </h2>
        </div>

        <div class="chart-kpi">
          <div class="chart-kpi-value">
            $170M+
          </div>

          <div class="chart-kpi-label">
            Combined Economic Impact
          </div>
        </div>

      </div>

      <p class="chart-description">
        Between 2022–2026, Hamilton hosted seven major events that collectively generated more than $170 million in economic impact — significantly exceeding the City’s target of $50 million.
      </p>

      <div id="chart"></div>

    </div>

  </div>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Chart -->
  <script src="./js/chart.js"></script>

</body>
</html>
